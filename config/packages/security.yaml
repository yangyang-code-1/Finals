security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        App\Entity\User:
            algorithm: auto
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        # 1. THE LOGIN GATE: This handles the /api/login_check request
        login:
            pattern: ^/api/login
            stateless: true
            json_login:
                check_path: /api/login_check
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # Public JSON endpoint: Google ID token -> Lexik JWT (customer mobile; see docs/BLOCK_C.md)
        api_auth_public:
            pattern: ^/api/auth
            stateless: true
            security: false

        # 2. THE PROTECTED API: This checks for the Bearer token on all other /api calls
        api:
            pattern: ^/api
            stateless: true
            jwt: ~

        main:
            lazy: true
            provider: app_user_provider
            custom_authenticators:
                - App\Security\LoginFormAuthenticator
                - App\Security\GoogleStaffAuthenticator
            logout:
                path: app_logout
                target: app_login

            # activate different ways to authenticate
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/connect/google-staff, roles: PUBLIC_ACCESS }
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/mobile/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/status, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/account$, roles: PUBLIC_ACCESS }
        - { path: ^/sample$, roles: PUBLIC_ACCESS }
        - { path: ^/commissions, roles: PUBLIC_ACCESS } # Customer browse page
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/admin/activity-logs, roles: ROLE_ADMIN }
        - { path: ^/user, roles: ROLE_ADMIN }
        - { path: ^/category, roles: [ROLE_ADMIN, ROLE_STAFF] }
        - { path: ^/commission/requests, roles: [ROLE_ADMIN, ROLE_STAFF] }
        - { path: ^/commission/active, roles: [ROLE_ADMIN, ROLE_STAFF] }
        - { path: ^/commission/\d+/accept, roles: [ROLE_ADMIN, ROLE_STAFF] }
        - { path: ^/commission/\d+/complete, roles: ROLE_STAFF }
        - { path: ^/commission(/|$), roles: [ROLE_ADMIN, ROLE_STAFF] }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
